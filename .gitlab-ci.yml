stages:
  - build
  - build-image
  - deploy

variables:
  IMAGE_NAME: "${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}:${CI_COMMIT_SHA}"

build:
  stage: build
  image: node:lts-alpine
  script:
    - npm ci
    - npm run build
    - ls -lh .output/  # ? Debug: Check build output
  artifacts:
    paths:
      - .output
    expire_in: 1 hour
  only:
    - main

build-image:
  stage: build-image
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
    - docker tag $IMAGE_NAME "${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}:latest"
    - docker rmi $IMAGE_NAME
    - docker rmi "${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}:latest"
    - docker image prune -f || true
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SERVER_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 400 ~/.ssh/id_rsa
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP "
        docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD &&
        docker pull $IMAGE_NAME &&
        docker stop frontend-app || true &&
        docker rm frontend-app || true &&
        docker image prune -af || true &&

        docker run -d --name frontend-app \
          -p 3000:3000 \
          $IMAGE_NAME
      "
  only:
    - main
